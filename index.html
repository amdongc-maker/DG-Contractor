<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Contractor DG Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Segoe UI;background:#f1f5f9;margin:0}
header{background:#047857;color:#fff;padding:14px;text-align:center;font-weight:700;font-size:18px}
.container{max-width:1100px;margin:auto;padding:12px}
.card{background:#fff;padding:14px;border-radius:12px;margin-bottom:14px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.profile{background:#ecfdf5;border-left:5px solid #047857}
input,select{width:100%;padding:10px;border-radius:8px;border:1px solid #ccc;margin:6px 0}
button{background:#22c55e;color:#fff;padding:10px;border:none;border-radius:8px;font-weight:700;width:100%;margin-top:10px;cursor:pointer}
.hidden{display:none}
table{width:100%;border-collapse:collapse;font-size:14px;margin-top:10px}
th,td{border:1px solid #e5e7eb;padding:8px;text-align:center}
th{background:#f0fdf4}
.history{background:#f0fdf4;border-left:4px solid #22c55e}
input, select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ddd;
  box-sizing:border-box;
  font-size:14px;
}
/* Buttons */
button{
  background-color: #047857;
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:14px;
  font-weight:700;color: #f1f5f9;
  cursor:pointer;
}
</style>
</head>

<body>

<header>🚛 CONTRACTOR DG PANEL</header>

<div class="container">

<div id="loginBox" class="card">
<h3>Contractor Login</h3>
<input id="user" placeholder="Contractor ID">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<div id="msg" style="color:red"></div>
</div>

<div id="mainBox" class="hidden">
<div id="profileBox" class="card profile"></div>

<h3>🟢 Active Requests</h3>
<div id="activeData"></div>

<h3>📜 History</h3>
<div id="historyData"></div>
</div>
</div>

<script>
  function formatDateTime(val){
  if(!val || val === "NA") return "NA";

  let d = new Date(val);

  if(isNaN(d.getTime())) return "NA";

  return d.toLocaleString("en-GB");
}
const WEBAPP_URL="https://script.google.com/macros/s/AKfycbw0sDlTPWJa0H6Wj8ug6dGzttaWqIhW0X-B4MdwTfa_Q5Uw_YGS1qdkLAIznComZz5kRQ/exec";

/* LOGIN USERS */
const CONTRACTORS=[
 {
  id:"C001", pass:"123",
  name:"MR. HIREN PATEL",
  company:"SURESH OIL FIELD",
  mobile:"9925244229",
  operators:[
   {name:"Ramesh Patel", mobile:"9001112233"},
   {name:"Amit Solanki", mobile:"9001112244"}
  ]
 }
];

let CURRENT_CONTRACTOR=null;

/* LOGIN */
function login(){
 let u=CONTRACTORS.find(x=>x.id===user.value && x.pass===pass.value);
 if(!u){ msg.innerText="❌ Invalid Login"; return; }
 CURRENT_CONTRACTOR=u;
 loginBox.classList.add("hidden");
 mainBox.classList.remove("hidden");
 profileBox.innerHTML=`<b>${u.name}</b><br>${u.company}<br>${u.mobile}`;
 loadData();
}

/* FORMAT DATE */
function fmtDate(d){
 if(!d) return "NA";
 try{ return new Date(d).toLocaleDateString("en-GB"); }
 catch(e){ return d; }
}

/* LOAD DATA */
function loadData(){
 fetch(`${WEBAPP_URL}?action=contractorApproved&company=${encodeURIComponent(CURRENT_CONTRACTOR.company)}`)
 .then(r=>r.json())
 .then(res=>{
  
 // ⭐ Latest request top par lane ke liye
 res.sort((a,b)=> Number(b.requestId) - Number(a.requestId));

  let activeHTML="", historyHTML="";

  res.forEach(req=>{
    let aRows="", hRows="";
    let sr=1;

    req.wells.forEach(w=>{

      // ✅ HISTORY
    let status = String(w.dgStatus || "").trim();

if(status === "DG Deployed"){
  // ✅ HISTORY
 hRows+=`
<tr>
  <td>${sr++}</td>
  <td>${w.well || "NA"}</td>
  <td>${w.operator || "NA"}</td>
  <td>${w.operatorMobile || w.operator_mobile || w.opMobile || "NA"}</td>
  <td>${formatDateTime(w.dgStart)}</td>
  <td>${formatDateTime(w.dgStop)}</td>
 <td>${w.totalTime || "NA"}</td>
</tr>`;
}
else if(status === "Rejected" || status === "DG CANCELLED"){
  // ❌ ignore completely → na Active me, na History me
}
else{
  // ✅ ACTIVE ONLY FOR PENDING
  let ops=CURRENT_CONTRACTOR.operators
    .map(o=>`<option value="${o.name}|${o.mobile}">${o.name} (${o.mobile})</option>`)
    .join("");

  aRows+=`
  <tr>
    <td>${sr++}</td>
    <td>${w.well}</td>
    <td>
      <select class="opSelect" data-row="${w.rowId}">
        <option value="">Select Operator</option>${ops}
      </select>
    </td>
  </tr>`;
}    });

    // ✅ ACTIVE CARD (added fields)
    if(aRows){
      activeHTML+=`
<div class="card">
 <h4>Request ID ${req.requestId}</h4>
 <b>Installation:</b> ${req.installation}<br>
 <b>Feeder:</b> ${req.feeder}<br>
 <b>Shutdown Date:</b> ${fmtDate(req.shutdownDate)}<br>
 <b>Requester Name:</b> ${req.requestedBy || "NA"}<br>
 <b>Requester Mobile:</b> ${req.mobile || "NA"}<br>
 <hr>
 <table>
   <tr><th>Sr</th><th>Well</th><th>Operator</th></tr>
   ${aRows}
 </table>
 <button onclick="finalSubmit(this)">FINAL SUBMIT</button>
</div>`;
    }

    // ✅ HISTORY CARD (added fields)
    if(hRows){
      historyHTML+=`
<div class="card history">
 <h4>Request ID ${req.requestId}</h4>
 <b>Installation:</b> ${req.installation}<br>
 <b>Feeder:</b> ${req.feeder}<br>
 <b>Shutdown Date:</b> ${fmtDate(req.shutdownDate)}<br>
 <b>Requester Name:</b> ${req.requestedBy || "NA"}<br>
 <b>Requester Mobile:</b> ${req.mobile || "NA"}<br>
 <table>
   <tr>
  <th>Sr</th>
  <th>Well No.</th>
  <th>Operator Name</th>
  <th>Mobile</th>
  <th>DG Start</th>
  <th>DG Stop</th>
  <th>Total Hrs</th>
</tr>
   ${hRows}
 </table>
</div>`;
    }
  });

  activeData.innerHTML = activeHTML || "No Active Requests";
  historyData.innerHTML = historyHTML || "No History";
 });
}

/* FINAL SUBMIT */
function finalSubmit(btn){

  // 🔒 double click guard
  if(btn.disabled) return;
  btn.disabled = true;
  btn.innerText = "Processing...";

  const selects = btn.closest(".card").querySelectorAll(".opSelect");

  let payload = [];

  selects.forEach(s=>{
    if(!s.value) return;

    let [name,mobile] = s.value.split("|");

    payload.push({
      rowId: s.dataset.row,
      operatorName: name,
      operatorMobile: mobile
    });
  });

  if(!payload.length){
    alert("Select Operator First");
    btn.disabled = false;
    btn.innerText = "FINAL SUBMIT";
    return;
  }

  fetch(`${WEBAPP_URL}?action=contractorFinalSubmit&data=${encodeURIComponent(JSON.stringify(payload))}`)
  .then(r=>r.text())
  .then(txt=>{
    if(String(txt).includes("OK")){
      alert("DG DEPLOYED ✅");
      loadData();
    }else{
      alert("Server Error");
      btn.disabled = false;
      btn.innerText = "FINAL SUBMIT";
    }
  })
  .catch(()=>{
    alert("Network Error");
    btn.disabled = false;
    btn.innerText = "FINAL SUBMIT";
  });
}
</script>

</body>
</html>
